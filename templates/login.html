<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Login</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg, #020024, #090979, #00d4ff);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-box {
      background: #fff;
      padding: 30px;
      width: 350px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<div class="login-box">

  <h4 class="text-center mb-3">🚗 Sistema Frota</h4>

<form method="POST">

  <input
    type="text"
    name="nome"
    placeholder="Usuário"
    class="form-control mb-2"
    required
  >

  <input
    type="email"
    name="email"
    placeholder="Email"
    class="form-control mb-2"
  >

  <input
    type="password"
    name="senha"
    placeholder="Senha"
    class="form-control mb-2"
    required
  >

  <button class="btn btn-success w-100">Cadastrar</button>

</form>

</div>

</body>
</html>
