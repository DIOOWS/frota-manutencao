<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <title>{% block title %}Sistema{% endblock %}</title>

  <!-- BOOTSTRAP -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- ICONES -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="d-flex">

  <!-- SIDEBAR -->
  <div class="sidebar">

    <h4 class="text-white mb-4">🚗 Frota</h4>

    <a href="/" class="menu-item">
      <i class="bi bi-speedometer2"></i> Dashboard
    </a>

    <a href="/manutencoes" class="menu-item">
      <i class="bi bi-tools"></i> Manutenções
    </a>

    <a href="/manutencoes/nova" class="menu-item">
      <i class="bi bi-plus-circle"></i> Nova
    </a>

  </div>

  <!-- CONTEÚDO -->
  <div class="content p-4 w-100">
    {% block content %}{% endblock %}
  </div>

</div>

<!-- SCRIPTS -->
<!-- SCRIPTS -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
</body>
</html>
