<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <title>{% block title %}Sistema{% endblock %}</title>

  <!-- BOOTSTRAP -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- ICONES -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="d-flex">

  <!-- SIDEBAR -->
  <div class="sidebar">

    <div class="logo-container">
        <img src="{{ url_for('static', filename='img/logo.png') }}" class="logo-img">
    </div>

    <!-- 🔥 USUÁRIO -->
    <div class="user-box text-center mb-3">
      <div class="user-avatar">👤</div>
      <div class="user-name">
        {{ session.get("user_nome", "Usuário") }}
      </div>
    </div>

    <a href="/" class="menu-item">📊 Dashboard</a>
    <a href="/manutencoes/" class="menu-item">🛠️ Manutenções</a>
    <a href="/clientes/" class="menu-item">👥 Clientes</a>
    <a href="/cadastro" class="menu-item">➕ Novo Usuário</a>
    <a href="/logout" class="menu-item logout">🚪 Sair</a>

  </div>

  <!-- CONTEÚDO -->
  <div class="content p-4 w-100">
    {% block content %}{% endblock %}
  </div>

</div>

<!-- SCRIPTS -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>

</body>
</html>
