{% extends "base.html" %}

{% block content %}

<h3>Clientes</h3>

<a href="javascript:history.back()" class="btn btn-secondary mb-3">
    ← Voltar
</a>

<a href="/clientes/novo" class="btn btn-success mb-3 float-end">
    + Novo Cliente
</a>

<div class="card p-3">

<table class="table">
    <thead>
        <tr>
            <th>Nome</th>
            <th>Telefone</th>
            <th>Email</th>
            <th>Ações</th> <!-- 🔥 NOVO -->
        </tr>
    </thead>

    <tbody>
        {% for c in clientes %}
        <tr>
            <td>{{ c.nome }}</td>
            <td>{{ c.telefone }}</td>
            <td>{{ c.email }}</td>

            <td>
                <!-- ✏️ EDITAR -->
                <a href="/clientes/editar/{{ c.id }}" class="btn btn-sm btn-warning">
                    Editar
                </a>

                <!-- 🗑️ EXCLUIR -->
                <a href="/clientes/excluir/{{ c.id }}"
                   class="btn btn-sm btn-danger"
                   onclick="return confirm('Deseja excluir este cliente?')">
                    Excluir
                </a>
            </td>

        </tr>
        {% endfor %}
    </tbody>
</table>

</div>

{% endblock %}
