{% extends "base.html" %}

{% block content %}

<h3>
  {% if user %}Editar Usuário{% else %}Novo Usuário{% endif %}
</h3>

<a href="/admin/usuarios" class="btn btn-secondary mb-3">
  ← Voltar
</a>

<div class="card p-4" style="max-width: 500px;">


{% if erro %}
  <div class="alert alert-danger">
    {{ erro }}
  </div>
{% endif %}

<form method="POST">

  <input name="nome"
         value="{{ user.nome if user else '' }}"
         placeholder="Usuário"
         class="form-control mb-2"
         required>

  <input name="email"
         value="{{ user.email if user else '' }}"
         placeholder="Email"
         class="form-control mb-2">

  <input type="password"
         name="senha"
         placeholder="Senha (deixe vazio para não alterar)"
         class="form-control mb-2">

  <select name="role" class="form-control mb-3">
    <option value="usuario"
      {% if user and user.role == "usuario" %}selected{% endif %}>
      Usuário
    </option>

    <option value="admin"
      {% if user and user.role == "admin" %}selected{% endif %}>
      Admin
    </option>
  </select>

  <button class="btn btn-success w-100">
    Salvar
  </button>

</form>

</div>

{% endblock %}
